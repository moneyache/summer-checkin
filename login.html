<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 暑假打卡小能手</title>
<meta name="theme-color" content="#FF8C42">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: linear-gradient(160deg, #4FC3F7 0%, #81D4FA 40%, #FFE082 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 12px 50px rgba(0,0,0,0.18);
    padding: 40px 34px;
    width: 100%; max-width: 400px;
    text-align: center;
    border: 4px solid #fff;
  }
  .emoji { font-size: 56px; line-height: 1; margin-bottom: 6px; }
  .card h1 { font-size: 26px; color: #FF8C42; margin-bottom: 4px; }
  .card .subtitle { color: #90A4AE; font-size: 13px; margin-bottom: 26px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 13px; color: #607D8B; margin-bottom: 6px; font-weight: 600; }
  .form-group input {
    width: 100%; padding: 13px 14px;
    border: 2px solid #FFE0B2; border-radius: 12px;
    font-size: 16px; outline: none; transition: border-color .2s;
    font-family: inherit;
  }
  .form-group input:focus { border-color: #FF8C42; }
  .btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: linear-gradient(135deg, #FF8C42, #FF7043);
    color: #fff; border: none; border-radius: 14px;
    font-size: 17px; font-weight: 700; cursor: pointer;
    transition: transform .1s, opacity .2s;
    box-shadow: 0 6px 18px rgba(255,112,67,0.4);
  }
  .btn:hover { opacity: .94; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { color: #e74c3c; font-size: 13px; margin-top: 12px; min-height: 20px; }
  .footer { margin-top: 20px; font-size: 14px; color: #90A4AE; }
  .footer a { color: #FF8C42; text-decoration: none; font-weight: 600; }
  .footer a:hover { text-decoration: underline; }
  .back-link { display:inline-block; margin-top:16px; font-size:13px; color:#90A4AE; text-decoration:none; }
  .back-link:hover { color:#FF8C42; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">☀️</div>
  <h1>登录</h1>
  <p class="subtitle">暑假打卡小能手 · 积分乐园</p>

  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
  <div class="error" id="errorMsg"></div>

  <div class="footer">还没有账号？<a href="register.html">立即注册</a></div>
  <a href="index.html" class="back-link">← 返回主页</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.js"></script>
<script src="auth.js"></script>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  btn.disabled = true; btn.textContent = '登录中...'; errEl.textContent = '';
  const result = await loginUser(username, password);
  if (result.success) {
    errEl.style.color = '#27ae60'; errEl.textContent = '登录成功，跳转中...';
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    setTimeout(() => { window.location.href = redirect || 'index.html'; }, 500);
  } else {
    errEl.style.color = '#e74c3c'; errEl.textContent = result.error;
    btn.disabled = false; btn.textContent = '登 录';
  }
}
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
checkLoginStatus().then(status => {
  if (status.loggedIn) {
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    window.location.href = redirect || 'index.html';
  }
});
</script>
</body>
</html>
